<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 · 게시판</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/board.html">게시판</a>
    <span class="navbar-user" id="navUser"></span>
  </nav>

  <div class="container">

    <!-- 상세 보기 -->
    <div id="viewMode" class="hidden">
      <div class="post-toolbar">
        <button class="btn btn-outline btn-sm" onclick="location.href='/board.html'">← 목록</button>
        <div class="post-toolbar-right" id="ownerButtons" style="display:none">
          <button class="btn btn-outline-primary btn-sm" onclick="enterEdit()">수정</button>
          <button class="btn btn-outline-danger btn-sm" onclick="deletePost()">삭제</button>
        </div>
      </div>
      <div class="card">
        <h2 class="post-title" id="viewTitle"></h2>
        <p class="post-meta" id="viewMeta"></p>
        <hr class="post-divider">
        <div class="post-content" id="viewContent"></div>
      </div>
    </div>

    <!-- 작성 / 수정 폼 -->
    <div id="editMode" class="hidden">
      <div class="post-toolbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn-outline btn-sm" onclick="cancelEdit()">← 취소</button>
          <span class="form-heading" id="formHeading"></span>
        </div>
      </div>
      <div class="card">
        <div id="formAlert" class="alert alert-danger hidden"></div>
        <div class="form-group">
          <input type="text" id="inputTitle" placeholder="제목">
        </div>
        <div class="form-group">
          <textarea id="inputContent" rows="16" placeholder="내용을 입력하세요"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="submitPost()">저장</button>
          <button class="btn btn-outline" onclick="cancelEdit()">취소</button>
        </div>
      </div>
    </div>

    <!-- 로딩 -->
    <p class="loading-msg" id="loadingMsg">불러오는 중…</p>

  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('navUser').textContent = getMe().username;

    const params = new URLSearchParams(location.search);
    const postId = params.get('id') ? parseInt(params.get('id')) : null;
    let post   = null;
    let isEdit = false;

    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function showFormAlert(msg) {
      const el = document.getElementById('formAlert');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function clearFormAlert() {
      document.getElementById('formAlert').classList.add('hidden');
    }

    function renderView(p) {
      post = p;
      document.title = p.title + ' · 게시판';
      document.getElementById('viewTitle').textContent = p.title;
      document.getElementById('viewMeta').textContent  =
        `${p.author_name}  ·  ${formatDate(p.created_at)}`;
      document.getElementById('viewContent').textContent = p.content;

      if (getMe().id === p.author_id) {
        document.getElementById('ownerButtons').style.display = 'flex';
      }

      hide('loadingMsg');
      show('viewMode');
    }

    function enterEdit() {
      if (!post) return;
      isEdit = true;
      document.getElementById('formHeading').textContent = '게시글 수정';
      document.getElementById('inputTitle').value        = post.title;
      document.getElementById('inputContent').value      = post.content;
      clearFormAlert();
      hide('viewMode');
      show('editMode');
    }

    function showWriteForm() {
      if (!requireAuth()) return;
      isEdit = false;
      document.title = '새 글 작성 · 게시판';
      document.getElementById('formHeading').textContent = '새 글 작성';
      document.getElementById('inputTitle').value        = '';
      document.getElementById('inputContent').value      = '';
      clearFormAlert();
      hide('loadingMsg');
      show('editMode');
    }

    function cancelEdit() {
      if (postId) {
        hide('editMode');
        show('viewMode');
      } else {
        location.href = '/board.html';
      }
    }

    async function submitPost() {
      const title   = document.getElementById('inputTitle').value.trim();
      const content = document.getElementById('inputContent').value.trim();
      if (!title) return showFormAlert('제목을 입력해주세요.');

      try {
        if (isEdit && post) {
          await API.posts.update(post.id, title, content);
          const updated = await API.posts.get(post.id);
          hide('editMode');
          renderView(updated);
        } else {
          const created = await API.posts.create(title, content);
          location.href = `/post.html?id=${created.id}`;
        }
      } catch (err) {
        showFormAlert(err.message);
      }
    }

    async function deletePost() {
      if (!post || !confirm('게시글을 삭제하시겠습니까?')) return;
      try {
        await API.posts.delete(post.id);
        location.href = '/board.html';
      } catch (err) {
        alert(err.message);
      }
    }

    (async () => {
      if (postId) {
        try {
          renderView(await API.posts.get(postId));
        } catch (err) {
          document.getElementById('loadingMsg').innerHTML =
            `<span style="color:var(--danger)">${escapeHtml(err.message)}</span>`;
        }
      } else {
        showWriteForm();
      }
    })();
  </script>
</body>
</html>
