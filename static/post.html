<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .content-area { white-space: pre-wrap; line-height: 1.8; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary px-3">
    <a class="navbar-brand fw-bold" href="/board.html">📋 게시판</a>
    <span class="text-white small" id="navUser"></span>
  </nav>

  <div class="container mt-4" style="max-width:800px">

    <!-- 상세 보기 -->
    <div id="viewMode" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-sm btn-outline-secondary" onclick="location.href='/board.html'">← 목록</button>
        <div id="ownerButtons" class="d-none d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary" onclick="enterEdit()">수정</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deletePost()">삭제</button>
        </div>
      </div>
      <h4 id="viewTitle" class="fw-bold mb-1"></h4>
      <div class="text-muted small mb-3" id="viewMeta"></div>
      <hr>
      <div id="viewContent" class="content-area mt-3"></div>
    </div>

    <!-- 작성 / 수정 폼 -->
    <div id="editMode" class="d-none">
      <div class="d-flex align-items-center mb-3">
        <button class="btn btn-sm btn-outline-secondary me-3" onclick="cancelEdit()">← 취소</button>
        <h6 class="mb-0 fw-bold" id="formHeading"></h6>
      </div>
      <div id="formAlert" class="alert alert-danger d-none py-2 mb-3"></div>
      <input type="text" class="form-control mb-3" id="inputTitle" placeholder="제목">
      <textarea class="form-control mb-3" id="inputContent" rows="15" placeholder="내용을 입력하세요"></textarea>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="submitPost()">저장</button>
        <button class="btn btn-secondary" onclick="cancelEdit()">취소</button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loadingMsg" class="text-center text-muted py-5">불러오는 중…</div>

  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('navUser').textContent = getMe().username;

    const params   = new URLSearchParams(location.search);
    const postId   = params.get('id') ? parseInt(params.get('id')) : null;
    let   post     = null;   // 현재 로드된 게시글
    let   isEdit   = false;  // true = 수정, false = 새 글

    // ── 상세 보기 렌더 ─────────────────────────────
    function renderView(p) {
      post = p;
      document.title = p.title + ' · 게시판';
      document.getElementById('viewTitle').textContent   = p.title;
      document.getElementById('viewMeta').textContent    =
        `${p.author_name}  ·  ${formatDate(p.created_at)}`;
      document.getElementById('viewContent').textContent = p.content;

      // 작성자만 수정/삭제 버튼 표시
      if (getMe().id === p.author_id) {
        document.getElementById('ownerButtons').classList.remove('d-none');
      }

      hide('loadingMsg');
      show('viewMode');
    }

    // ── 수정 폼 진입 ──────────────────────────────
    function enterEdit() {
      if (!post) return;
      isEdit = true;
      document.getElementById('formHeading').textContent = '게시글 수정';
      document.getElementById('inputTitle').value        = post.title;
      document.getElementById('inputContent').value      = post.content;
      clearFormAlert();
      hide('viewMode');
      show('editMode');
    }

    // ── 새 글 쓰기 폼 ─────────────────────────────
    function showWriteForm() {
      if (!requireAuth()) return;
      isEdit = false;
      document.title = '새 글 작성 · 게시판';
      document.getElementById('formHeading').textContent = '새 글 작성';
      document.getElementById('inputTitle').value        = '';
      document.getElementById('inputContent').value      = '';
      clearFormAlert();
      hide('loadingMsg');
      show('editMode');
    }

    function cancelEdit() {
      if (postId) {
        hide('editMode');
        show('viewMode');
      } else {
        location.href = '/board.html';
      }
    }

    // ── 저장 ──────────────────────────────────────
    async function submitPost() {
      const title   = document.getElementById('inputTitle').value.trim();
      const content = document.getElementById('inputContent').value.trim();
      if (!title) return showFormAlert('제목을 입력해주세요.');

      try {
        if (isEdit && post) {
          await API.posts.update(post.id, title, content);
          const updated = await API.posts.get(post.id);
          hide('editMode');
          renderView(updated);
        } else {
          const created = await API.posts.create(title, content);
          location.href = `/post.html?id=${created.id}`;
        }
      } catch (err) {
        showFormAlert(err.message);
      }
    }

    // ── 삭제 ──────────────────────────────────────
    async function deletePost() {
      if (!post || !confirm('게시글을 삭제하시겠습니까?')) return;
      try {
        await API.posts.delete(post.id);
        location.href = '/board.html';
      } catch (err) {
        alert(err.message);
      }
    }

    // ── 유틸 ──────────────────────────────────────
    function show(id) { document.getElementById(id).classList.remove('d-none'); }
    function hide(id) { document.getElementById(id).classList.add('d-none'); }

    function showFormAlert(msg) {
      const el = document.getElementById('formAlert');
      el.className = 'alert alert-danger py-2 mb-3';
      el.textContent = msg;
    }
    function clearFormAlert() {
      document.getElementById('formAlert').className = 'alert alert-danger d-none py-2 mb-3';
    }

    // ── 진입점 ────────────────────────────────────
    (async () => {
      if (postId) {
        try {
          const p = await API.posts.get(postId);
          renderView(p);
        } catch (err) {
          document.getElementById('loadingMsg').innerHTML =
            `<span class="text-danger">${escapeHtml(err.message)}</span>`;
        }
      } else {
        showWriteForm();
      }
    })();
  </script>
</body>
</html>
