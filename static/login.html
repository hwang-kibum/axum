<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 · 게시판</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">게시판</h1>

      <div class="tabs">
        <button class="tab-btn active" id="tabLogin">로그인</button>
        <button class="tab-btn" id="tabRegister">회원가입</button>
      </div>

      <div id="alert" class="alert alert-danger hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUser" placeholder="사용자 이름" required autofocus>
        </div>
        <div class="form-group">
          <input type="password" id="loginPass" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">로그인</button>
      </form>

      <form id="registerForm" class="hidden">
        <div class="form-group">
          <input type="text" id="regUser" placeholder="사용자 이름" required>
        </div>
        <div class="form-group">
          <input type="password" id="regPass" placeholder="비밀번호" required>
          <p class="form-hint">비밀번호는 최소 8자 이상이어야 합니다.</p>
        </div>
        <button type="submit" class="btn btn-success btn-block">회원가입</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (localStorage.getItem('jwt')) location.href = '/board.html';

    const alertEl = document.getElementById('alert');

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.classList.remove('hidden');
    }
    function clearAlert() {
      alertEl.classList.add('hidden');
    }

    document.getElementById('tabLogin').addEventListener('click', () => {
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      clearAlert();
    });
    document.getElementById('tabRegister').addEventListener('click', () => {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('registerForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      clearAlert();
    });

    function saveAndRedirect(data) {
      localStorage.setItem('jwt', data.token);
      localStorage.setItem('username', data.username);
      localStorage.setItem('userId', data.user_id);
      location.href = '/board.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();
      try {
        const data = await API.auth.login(
          document.getElementById('loginUser').value,
          document.getElementById('loginPass').value,
        );
        saveAndRedirect(data);
      } catch (err) {
        showAlert(err.message);
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();
      try {
        const data = await API.auth.register(
          document.getElementById('regUser').value,
          document.getElementById('regPass').value,
        );
        saveAndRedirect(data);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
</body>
</html>
