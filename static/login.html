<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 · 게시판</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .card { border: none; border-radius: 12px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm p-4" style="width:380px">
    <h5 class="text-center fw-bold mb-4">📋 게시판</h5>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button class="nav-link active" id="tabLogin">로그인</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tabRegister">회원가입</button>
      </li>
    </ul>

    <div id="alert" class="alert d-none py-2 mb-3"></div>

    <!-- 로그인 폼 -->
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" class="form-control" id="loginUser" placeholder="사용자 이름" required autofocus>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="loginPass" placeholder="비밀번호" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>

    <!-- 회원가입 폼 -->
    <form id="registerForm" class="d-none">
      <div class="mb-3">
        <input type="text" class="form-control" id="regUser" placeholder="사용자 이름" required>
      </div>
      <div class="mb-2">
        <input type="password" class="form-control" id="regPass" placeholder="비밀번호 (8자 이상)" required>
      </div>
      <div class="mb-3">
        <small class="text-muted">비밀번호는 최소 8자 이상이어야 합니다.</small>
      </div>
      <button type="submit" class="btn btn-success w-100">회원가입</button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (localStorage.getItem('jwt')) location.href = '/board.html';

    const alert = document.getElementById('alert');

    function showAlert(msg, type = 'danger') {
      alert.className = `alert alert-${type} py-2 mb-3`;
      alert.textContent = msg;
    }
    function clearAlert() {
      alert.className = 'alert d-none py-2 mb-3';
    }

    // 탭 전환
    document.getElementById('tabLogin').addEventListener('click', () => {
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('tabRegister').classList.remove('active');
      document.getElementById('loginForm').classList.remove('d-none');
      document.getElementById('registerForm').classList.add('d-none');
      clearAlert();
    });
    document.getElementById('tabRegister').addEventListener('click', () => {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('registerForm').classList.remove('d-none');
      document.getElementById('loginForm').classList.add('d-none');
      clearAlert();
    });

    function saveAndRedirect(data) {
      localStorage.setItem('jwt', data.token);
      localStorage.setItem('username', data.username);
      localStorage.setItem('userId', data.user_id);
      location.href = '/board.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const data = await API.auth.login(
          document.getElementById('loginUser').value,
          document.getElementById('loginPass').value,
        );
        saveAndRedirect(data);
      } catch (err) {
        showAlert(err.message);
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const data = await API.auth.register(
          document.getElementById('regUser').value,
          document.getElementById('regPass').value,
        );
        saveAndRedirect(data);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
</body>
</html>
