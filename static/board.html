<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시판</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/board.html">게시판</a>
    <div class="navbar-right">
      <span class="navbar-user" id="navUser"></span>
      <button class="btn-nav" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <div class="board-header">
      <p class="board-total">전체 게시글 <strong id="totalCount"></strong></p>
      <button class="btn btn-primary btn-sm" onclick="location.href='/post.html'">+ 새 글 작성</button>
    </div>

    <table>
      <thead>
        <tr>
          <th class="center" style="width:60px">번호</th>
          <th>제목</th>
          <th style="width:110px">작성자</th>
          <th class="center" style="width:110px">날짜</th>
        </tr>
      </thead>
      <tbody id="postBody">
        <tr><td colspan="4" class="empty">불러오는 중…</td></tr>
      </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAuth();
    document.getElementById('navUser').textContent = getMe().username;

    const PER_PAGE = 10;
    let currentPage = 1;

    function logout() {
      localStorage.clear();
      location.href = '/login.html';
    }

    async function loadPosts(page) {
      currentPage = page;
      const tbody = document.getElementById('postBody');
      try {
        const data = await API.posts.list(page, PER_PAGE);
        document.getElementById('totalCount').textContent = data.total;

        if (data.posts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">게시글이 없습니다.</td></tr>';
        } else {
          tbody.innerHTML = data.posts.map((p, i) => {
            const num  = data.total - (page - 1) * PER_PAGE - i;
            const date = formatDate(p.created_at).slice(0, 10);
            return `
              <tr class="clickable" onclick="location.href='/post.html?id=${p.id}'">
                <td class="center muted">${num}</td>
                <td>${escapeHtml(p.title)}</td>
                <td class="muted">${escapeHtml(p.author_name)}</td>
                <td class="center muted">${date}</td>
              </tr>`;
          }).join('');
        }

        const totalPages = Math.ceil(data.total / PER_PAGE);
        const nav = document.getElementById('pagination');
        nav.innerHTML = totalPages <= 1 ? '' :
          Array.from({ length: totalPages }, (_, i) => i + 1).map(p => `
            <button class="page-btn${p === page ? ' active' : ''}" onclick="loadPosts(${p})">${p}</button>
          `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="empty" style="color:var(--danger)">${escapeHtml(err.message)}</td></tr>`;
      }
    }

    loadPosts(1);
  </script>
</body>
</html>
